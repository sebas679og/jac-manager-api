name: Code Quality for jac-manager-api

on:
  pull_request:
  workflow_dispatch:

jobs:

  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Spotless — check format
        run: mvn spotless:check

      - name: Checkstyle — check style
        run: mvn checkstyle:check

      - name: PMD — static analysis
        run: mvn pmd:check